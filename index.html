<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft YaHei",sans-serif}
:root{--bg:#f5f7fa;--card:#fff;--text:#333;--border:#ddd;--accent:#409eff}
[data-theme="dark"]{--bg:#1a1a1a;--card:#2c2c2c;--text:#eee;--border:#444;--accent:#53a6ff}

body{
  background:var(--bg);
  color:var(--text);
  width:940px;
  margin:0 auto;
  padding:20px 0;
  transition:.2s;
}

/* 百度搜索 */
.search-module {
  width:680px;
  margin:0 auto 22px;
}
.search-tab {
  display:flex;
  gap:1px;
  margin-bottom:4px;
}
.search-tab span {
  padding:5px 10px;
  background:#e4e4e4;
  font-size:14px;
  cursor:pointer;
  border-radius:4px 4px 0 0;
}
.search-tab span.active {
  background:#3385ff;
  color:#fff;
}
.search-bar {
  display:flex;
  height:40px;
  border:1px solid #3385ff;
  border-radius:0 4px 4px 4px;
  overflow:hidden;
}
.search-bar input {
  flex:1;
  border:none;
  outline:none;
  padding:0 10px;
  font-size:14px;
  background:#fff;
  color:#333;
}
.search-bar button {
  width:90px;
  background:#3385ff;
  color:#fff;
  font-size:15px;
  border:none;
  cursor:pointer;
}

/* 头部 */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}
.bar{display:flex;gap:6px}
.bar button{padding:6px 10px;border-radius:4px;border:none;cursor:pointer;font-size:13px}
.btn-dark{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-bg{background:var(--accent);color:#fff}

.panel{
  background:var(--card);
  padding:12px;
  border-radius:8px;
  margin-bottom:12px;
  border:1px solid var(--border);
}
input{
  width:100%;
  padding:7px;
  margin:5px 0;
  border:1px solid var(--border);
  border-radius:4px;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
}

h2{
  font-size:16px;
  margin:18px 0 8px;
}

/* 一行6个卡片 */
.grid{
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:8px;
  margin-bottom:8px;
}
.item{
  background:var(--card);
  padding:10px 6px;
  border-radius:6px;
  border:1px solid var(--border);
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:flex-start;
  gap:6px;
  padding-left:10px;
}
.site-ico{
  width:18px;
  height:18px;
  border-radius:3px;
  object-fit:cover;
  background:#eee;
}
.item a{
  color:var(--text);
  text-decoration:none;
  font-size:13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width:88px;
}
.item:hover{
  background:#e8f4ff;
  border-color:#409eff;
}
.item:hover a{
  color:#0066cc;
}

.content-wrap{
  background: rgba(255,255,255,0.82);
  border-radius:12px;
  padding:16px;
}

.hide{display:none}
</style>
</head>
<body>

<!-- 百度搜索 -->
<div class="search-module">
  <div class="search-tab">
    <span class="active" data-type="web">网页</span>
    <span data-type="tieba">贴吧</span>
    <span data-type="zhidao">知道</span>
    <span data-type="map">地图</span>
    <span data-type="video">视频</span>
  </div>
  <div class="search-bar">
    <input id="kw" placeholder="请输入搜索内容" onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">百度一下</button>
  </div>
</div>

<div class="header">
  <h1>我的导航</h1>
  <div class="bar">
    <button class="btn-bg" id="changeBgBtn">背景</button>
    <button class="btn-dark" id="toggleDark">暗黑模式</button>
  </div>
</div>

<!-- 更换背景 -->
<div class="panel hide" id="bgPanel">
  <input id="bgUrl" placeholder="图片链接">
  <button id="saveBgBtn" style="margin-top:6px;background:#409eff;color:#fff;width:100%;padding:7px;border:none;border-radius:4px;cursor:pointer">应用背景</button>
</div>

<div class="content-wrap">
  <div id="content"></div>
</div>

<script>
// 搜索
let searchType = 'web';
document.querySelectorAll('.search-tab span').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.search-tab span').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    searchType = tab.dataset.type;
  }
});

function doSearch() {
  const kw = document.getElementById('kw').value.trim();
  if (!kw) return;
  let url = '';
  switch (searchType) {
    case 'web': url = 'https://www.baidu.com/s?wd='; break;
    case 'tieba': url = 'https://tieba.baidu.com/f?kw='; break;
    case 'zhidao': url = 'https://zhidao.baidu.com/search?word='; break;
    case 'map': url = 'https://map.baidu.com/search/'; break;
    case 'video': url = 'https://video.baidu.com/v?word='; break;
  }
  window.open(url + encodeURIComponent(kw));
}

// 图标
function getFaviconUrl(url) {
  return `https://api.xinac.net/icon/?url=${encodeURIComponent(url)}`;
}

// 读取 sites.json
async function loadData() {
  try {
    const res = await fetch('./sites.json');
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('content').innerHTML = '<p>加载 sites.json 失败</p>';
  }
}

// 渲染页面
function render(data) {
  if (!data?.categories || !data?.sites) return;

  const sortedCates = [...data.categories].sort((a, b) => (a.sort || 10) - (b.sort || 10));
  let html = '';

  sortedCates.forEach(cate => {
    const list = data.sites.filter(s => s.cate === cate.name);
    html += `<h2>${cate.name}</h2><div class="grid">`;
    list.forEach(site => {
      const ico = getFaviconUrl(site.url);
      html += `
      <div class="item">
        <img class="site-ico" src="${ico}" alt="" onerror="this.style.display='none'">
        <a href="${site.url}" target="_blank">${site.name}</a>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('content').innerHTML = html;
}

// 暗黑模式
document.getElementById('toggleDark').onclick = () => {
  const dark = document.body.dataset.theme !== 'dark';
  document.body.dataset.theme = dark ? 'dark' : '';
  localStorage.setItem('DARK', dark ? '1' : '0');
};

// 背景
document.getElementById('changeBgBtn').onclick = () => {
  document.getElementById('bgPanel').classList.toggle('hide');
};
document.getElementById('saveBgBtn').onclick = () => {
  const url = document.getElementById('bgUrl').value.trim();
  if (!url) return alert('请输入图片链接');
  document.body.style.background = `url(${url}) center center / cover fixed`;
  localStorage.setItem('BG_URL', url);
  document.getElementById('bgPanel').classList.add('hide');
};

// 自动恢复
if (localStorage.getItem('DARK') === '1') {
  document.body.dataset.theme = 'dark';
}
const bg = localStorage.getItem('BG_URL');
if (bg) {
  document.body.style.background = `url(${bg}) center center / cover fixed`;
}

// 启动
loadData();
</script>
</body>
</html>
